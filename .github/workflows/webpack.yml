app_config:
  name: "FountainHome"
  display_name: "Fountain Stream"
  version: "1.0.0"
  version_code: 1
  package_name: "com.fountainstream.app"
  description: "Your ultimate streaming destination with a cyber fountain experience"
  
  icon:
    path: "public/fountain-icon.jpg"
    sizes:
      - 192
      - 512

  splash:
    background_color: "#000000"
    text_color: "#FFFFFF"
    logo: "public/fountain-icon.jpg"

build:
  # Web to APK conversion using Capacitor
  framework: "capacitor"
  platforms:
    - android
    - ios
    - web

  android:
    min_sdk_version: 24
    target_sdk_version: 35
    compile_sdk_version: 35
    
    permissions:
      - "android.permission.INTERNET"
      - "android.permission.ACCESS_NETWORK_STATE"
      - "android.permission.WRITE_EXTERNAL_STORAGE"
      - "android.permission.READ_EXTERNAL_STORAGE"
    
    gradle_properties:
      org.gradle.jvmargs: "-Xmx1024m"
      android.enableJetifier: "true"
    
    signing:
      store_file: "build.keystore"
      store_password: "env:ANDROID_STORE_PASSWORD"
      key_alias: "fountain_app"
      key_password: "env:ANDROID_KEY_PASSWORD"

  ios:
    min_deployment_target: "13.0"
    team_id: "env:IOS_TEAM_ID"
    provisioning_profile: "env:IOS_PROVISIONING_PROFILE"
    code_sign_identity: "iPhone Developer"

  # Next.js specific build
  node_version: "20"
  npm_command: "pnpm install && pnpm run build"
  output_dir: ".next/standalone"

features:
  offline_mode: true
  push_notifications: false
  background_sync: true
  cache_strategy: "network-first"
  storage:
    local_storage: true
    indexed_db: true
    cache_api: true

performance:
  minify: true
  source_maps: false
  lazy_load: true
  code_split: true

security:
  https_only: true
  csp_enabled: true
  x_frame_options: "DENY"
  x_content_type_options: "nosniff"
  allow_external_domains:
    - "api.themoviedb.org"
    - "image.tmdb.org"
    - "*.vidsrc.me"
    - "*.vidplay.online"
    - "*.vidsrc.pro"

signing_config:
  ios:
    development:
      provisioning_style: "automatic"
    production:
      provisioning_style: "manual"
  
  android:
    development:
      debug_keystore: true
    production:
      release_keystore: true

output:
  android:
    format: "apk"
    signed: true
    output_name: "FountainHome-${version}-release.apk"
  
  ios:
    format: "ipa"
    signed: true
    output_name: "FountainHome-${version}-release.ipa"

deployment:
  app_store:
    enabled: false
  
  play_store:
    enabled: true
    package_name: "com.fountainstream.app"
    track: "internal"
  
  direct:
    enabled: true
    storage: "s3"
    bucket: "fountain-releases"
    prefix: "builds/"

monitoring:
  crash_reporting: true
  analytics: true
  performance_monitoring: false
  error_tracking: true

environment:
  development:
    api_base: "https://api.themoviedb.org"
    debug: true
  
  production:
    api_base: "https://api.themoviedb.org"
    debug: false
    minify: true

scripts:
  prebuild:
    - "npm install"
    - "npm run lint"
  
  postbuild:
    - "npm run test"
    - "npm run build:copy-assets"
    
