name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js web app
        run: npm run build

      - name: Export static build
        run: |
          mkdir -p out
          cp -r .next/static out/ 2>/dev/null || true
          cp public/* out/ 2>/dev/null || true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        continue-on-error: true

      - name: Build APK with fallback
        if: failure()
        run: |
          cd android
          gradle clean assembleRelease --stacktrace
        continue-on-error: true

      - name: Find and prepare APK
        run: |
          find android -name "*.apk" -type f | head -5
          mkdir -p apk-output
          find android -name "*.apk" -type f -exec cp {} apk-output/ \;

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FountainHome-APK
          path: apk-output/
          if-no-files-found: ignore

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: apk-output/*.apk
          tag_name: v1.0.0-${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Build status
        run: echo "APK build completed. Check artifacts for output files."
